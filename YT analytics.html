<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chuck Ellis — YouTube Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --surface-2: #f0efe9;
    --text-primary: #0b0b0b;
    --text-secondary: #52514e;
    --text-muted: #898781;
    --border: rgba(11,11,11,0.10);
    --border-strong: rgba(11,11,11,0.18);
    --accent: #2a78d6;
    --accent-light: #e6f1fb;
    --radius: 8px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 0.5px solid var(--border-strong);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .header-left { display: flex; align-items: center; gap: 14px; }

  .channel-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; font-weight: 600; color: var(--accent);
    overflow: hidden;
  }

  .channel-avatar img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

  .channel-name { font-size: 16px; font-weight: 600; color: var(--text-primary); }
  .channel-handle { font-size: 13px; color: var(--text-muted); margin-top: 1px; }

  .refresh-btn {
    font-size: 13px;
    color: var(--text-secondary);
    background: none;
    border: 0.5px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 6px 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .refresh-btn:hover { background: var(--surface-2); }

  main { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem; }

  .metric-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 2rem;
  }

  .metric-card {
    background: var(--surface);
    border-radius: var(--radius);
    border: 0.5px solid var(--border);
    padding: 1.125rem 1.25rem;
  }

  .metric-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }

  .metric-value {
    font-size: 30px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1;
    letter-spacing: -0.02em;
  }

  .metric-sub {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .section {
    background: var(--surface);
    border-radius: 12px;
    border: 0.5px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .section-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 1.25rem;
  }

  .chart-wrap { position: relative; width: 100%; height: 220px; }

  .video-list { display: flex; flex-direction: column; gap: 6px; }

  .video-row {
    display: grid;
    grid-template-columns: 28px 1fr auto;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: var(--radius);
    transition: background 0.12s;
  }
  .video-row:hover { background: var(--surface-2); }

  .video-rank {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 500;
    text-align: right;
  }

  .video-info { overflow: hidden; }

  .video-title {
    font-size: 13px;
    color: var(--text-primary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.4;
  }

  .video-meta { display: flex; align-items: center; gap: 10px; margin-top: 5px; }

  .video-bar-track {
    flex: 1;
    height: 3px;
    background: var(--border-strong);
    border-radius: 2px;
    max-width: 120px;
  }

  .video-bar-fill {
    height: 3px;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .video-date { font-size: 11px; color: var(--text-muted); white-space: nowrap; }

  .video-views {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    white-space: nowrap;
    min-width: 58px;
    text-align: right;
  }

  .error-box {
    padding: 1rem 1.25rem;
    background: #fcebeb;
    border: 0.5px solid #f09595;
    border-radius: var(--radius);
    color: #791f1f;
    font-size: 14px;
    line-height: 1.6;
  }

  .skeleton {
    background: linear-gradient(90deg, var(--surface-2) 25%, var(--bg) 50%, var(--surface-2) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: var(--radius);
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .last-updated {
    font-size: 11px;
    color: var(--text-muted);
    text-align: right;
    margin-top: 1rem;
  }

  @media (max-width: 520px) {
    .metric-row { grid-template-columns: 1fr 1fr; }
    main { padding: 1.25rem 1rem; }
    header { padding: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="channel-avatar" id="avatarWrap">CE</div>
    <div>
      <div class="channel-name" id="channelName">Chuck Ellis</div>
      <div class="channel-handle">@thechuckellis</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Refresh</button>
</header>

<main>
  <div class="metric-row" id="metrics">
    <div class="metric-card"><div class="metric-label">Subscribers</div><div class="metric-value skeleton" style="width:80px;height:30px;">&nbsp;</div></div>
    <div class="metric-card"><div class="metric-label">Total views</div><div class="metric-value skeleton" style="width:100px;height:30px;">&nbsp;</div></div>
    <div class="metric-card"><div class="metric-label">Videos</div><div class="metric-value skeleton" style="width:60px;height:30px;">&nbsp;</div></div>
  </div>

  <div class="section">
    <div class="section-title">Recent video performance — views</div>
    <div class="chart-wrap">
      <canvas id="barChart" role="img" aria-label="Bar chart of view counts for the 20 most recent YouTube videos.">Loading…</canvas>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Last 20 videos</div>
    <div class="video-list" id="videoList">
      <div style="color:var(--text-muted);font-size:14px;">Loading videos…</div>
    </div>
  </div>

  <div class="last-updated" id="lastUpdated"></div>
</main>

<script>
const API_KEY = 'AIzaSyAQ_KoeHooB_XPnNduHFuB6q9bR9Up5UmU';
const HANDLE = 'thechuckellis';
let chartInstance = null;

function fmt(n) {
  n = parseInt(n) || 0;
  if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function fmtDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showError(msg) {
  document.getElementById('metrics').innerHTML = `<div class="error-box" style="grid-column:1/-1"><strong>Could not load data.</strong><br>${msg}<br><br>Make sure the YouTube Data API v3 is enabled in your Google Cloud Console and the API key has no domain restrictions blocking localhost.</div>`;
  document.getElementById('videoList').innerHTML = '';
}

async function loadData() {
  try {
    // 1. Channel info
    const chanRes = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=snippet,statistics,contentDetails&forHandle=${HANDLE}&key=${API_KEY}`);
    const chanData = await chanRes.json();

    if (chanData.error) throw new Error(chanData.error.message);
    if (!chanData.items?.length) throw new Error(`No channel found for @${HANDLE}`);

    const channel = chanData.items[0];
    const stats = channel.statistics;
    const thumb = channel.snippet?.thumbnails?.default?.url;

    // Avatar
    if (thumb) {
      document.getElementById('avatarWrap').innerHTML = `<img src="${thumb}" alt="Channel avatar">`;
    }
    document.getElementById('channelName').textContent = channel.snippet?.title || 'Chuck Ellis';

    // Metrics
    document.getElementById('metrics').innerHTML = `
      <div class="metric-card">
        <div class="metric-label">Subscribers</div>
        <div class="metric-value">${stats.hiddenSubscriberCount ? '—' : fmt(stats.subscriberCount)}</div>
        <div class="metric-sub">${stats.hiddenSubscriberCount ? 'count hidden' : 'subscribers'}</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Total views</div>
        <div class="metric-value">${fmt(stats.viewCount)}</div>
        <div class="metric-sub">all time</div>
      </div>
      <div class="metric-card">
        <div class="metric-label">Videos</div>
        <div class="metric-value">${fmt(stats.videoCount)}</div>
        <div class="metric-sub">published</div>
      </div>
    `;

    // 2. Uploads playlist
    const uploadsId = channel.contentDetails.relatedPlaylists.uploads;
    const plRes = await fetch(`https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&playlistId=${uploadsId}&maxResults=20&key=${API_KEY}`);
    const plData = await plRes.json();
    if (plData.error) throw new Error(plData.error.message);

    const videoIds = (plData.items || []).map(i => i.contentDetails.videoId).join(',');

    // 3. Video stats
    const vidRes = await fetch(`https://www.googleapis.com/youtube/v3/videos?part=statistics,snippet&id=${videoIds}&key=${API_KEY}`);
    const vidData = await vidRes.json();
    if (vidData.error) throw new Error(vidData.error.message);

    const videos = vidData.items || [];
    const viewCounts = videos.map(v => parseInt(v.statistics.viewCount) || 0);
    const maxViews = Math.max(...viewCounts);

    // 4. Bar chart
    if (chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('barChart'), {
      type: 'bar',
      data: {
        labels: videos.map((_, i) => `#${i + 1}`),
        datasets: [{
          label: 'Views',
          data: viewCounts,
          backgroundColor: '#2a78d6',
          borderRadius: 4,
          borderSkipped: 'bottom',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              title: (items) => {
                const v = videos[items[0].dataIndex];
                const t = v?.snippet?.title || '';
                return t.length > 55 ? t.slice(0, 55) + '…' : t;
              },
              label: (item) => '  ' + item.raw.toLocaleString() + ' views'
            }
          }
        },
        scales: {
          x: {
            ticks: { color: '#898781', font: { size: 11 }, autoSkip: false },
            grid: { display: false },
            border: { color: '#c3c2b7' }
          },
          y: {
            ticks: { color: '#898781', font: { size: 11 }, callback: v => fmt(v) },
            grid: { color: '#e1e0d9', lineWidth: 1 },
            border: { display: false }
          }
        }
      }
    });

    // 5. Video list
    document.getElementById('videoList').innerHTML = videos.map((v, i) => {
      const views = viewCounts[i];
      const pct = maxViews > 0 ? Math.round((views / maxViews) * 100) : 0;
      const ytUrl = `https://www.youtube.com/watch?v=${v.id}`;
      return `
        <div class="video-row" onclick="window.open('${ytUrl}','_blank')" style="cursor:pointer;" title="Open on YouTube">
          <div class="video-rank">${i + 1}</div>
          <div class="video-info">
            <div class="video-title">${v.snippet.title}</div>
            <div class="video-meta">
              <div class="video-bar-track"><div class="video-bar-fill" style="width:${pct}%"></div></div>
              <div class="video-date">${fmtDate(v.snippet.publishedAt)}</div>
            </div>
          </div>
          <div class="video-views">${fmt(views)}</div>
        </div>
      `;
    }).join('');

    document.getElementById('lastUpdated').textContent = 'Last updated ' + new Date().toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });

  } catch (err) {
    showError(err.message);
  }
}

loadData();
</script>
</body>
</html>
